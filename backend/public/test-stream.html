<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>测试流式响应</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
      background: #f5f5f5;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 {
      color: #333;
      margin-bottom: 30px;
    }
    .input-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #666;
    }
    input, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      box-sizing: border-box;
    }
    textarea {
      min-height: 100px;
      resize: vertical;
    }
    button {
      background: #1890ff;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.3s;
    }
    button:hover {
      background: #096dd9;
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .response {
      margin-top: 30px;
      padding: 20px;
      background: #f9f9f9;
      border-radius: 8px;
      border-left: 4px solid #1890ff;
      min-height: 100px;
      white-space: pre-wrap;
      word-wrap: break-word;
      line-height: 1.6;
    }
    .status {
      margin-top: 10px;
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 12px;
    }
    .status.success {
      background: #f6ffed;
      color: #52c41a;
      border: 1px solid #b7eb8f;
    }
    .status.error {
      background: #fff2f0;
      color: #ff4d4f;
      border: 1px solid #ffccc7;
    }
    .status.loading {
      background: #e6f7ff;
      color: #1890ff;
      border: 1px solid #91d5ff;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌊 测试流式响应</h1>
    
    <div class="input-group">
      <label>会话 ID:</label>
      <input type="text" id="sessionId" placeholder="输入会话 ID" />
    </div>
    
    <div class="input-group">
      <label>消息内容:</label>
      <textarea id="content" placeholder="输入消息内容..."></textarea>
    </div>
    
    <button id="sendBtn" onclick="sendMessage()">发送消息</button>
    
    <div id="status" class="status" style="display: none;"></div>
    <div id="response" class="response" style="display: none;"></div>
  </div>

  <script>
    let isStreaming = false;

    function showStatus(message, type) {
      const statusEl = document.getElementById('status');
      statusEl.textContent = message;
      statusEl.className = `status ${type}`;
      statusEl.style.display = 'block';
    }

    async function sendMessage() {
      if (isStreaming) return;

      const sessionId = document.getElementById('sessionId').value.trim();
      const content = document.getElementById('content').value.trim();

      if (!sessionId || !content) {
        alert('请填写会话 ID 和消息内容');
        return;
      }

      isStreaming = true;
      document.getElementById('sendBtn').disabled = true;
      
      const responseEl = document.getElementById('response');
      responseEl.style.display = 'block';
      responseEl.textContent = '';

      showStatus('正在发送...', 'loading');

      try {
        const response = await fetch(`/api/conversations/${sessionId}/messages`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ content }),
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }

        showStatus('正在接收响应...', 'loading');

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n\n');
          buffer = lines.pop() || '';

          for (const line of lines) {
            if (line.startsWith('data: ')) {
              try {
                const data = JSON.parse(line.slice(6));
                
                if (data.type === 'user_message') {
                  responseEl.textContent = `[用户] ${data.content}\n\n`;
                } else if (data.type === 'chunk') {
                  responseEl.textContent += data.content;
                } else if (data.type === 'complete') {
                  showStatus('✅ 响应完成', 'success');
                } else if (data.type === 'error') {
                  showStatus(`❌ 错误: ${data.message}`, 'error');
                }
              } catch (e) {
                console.error('解析 SSE 数据失败:', e);
              }
            }
          }
        }

      } catch (error) {
        console.error('发送消息失败:', error);
        showStatus(`❌ 错误: ${error.message}`, 'error');
      } finally {
        isStreaming = false;
        document.getElementById('sendBtn').disabled = false;
      }
    }

    // 支持 Enter 键发送
    document.getElementById('content').addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        sendMessage();
      }
    });
  </script>
</body>
</html>
